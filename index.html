<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMARA Architektur</title>

<style>
body {
    margin: 0;
    font-family: 'Helvetica Neue', sans-serif;
    background: #f7f3f1;
    color: #2b2b2b;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
}

.hero {
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    align-items: center;
}

.text {
    flex: 1;
}

.text h1 {
    font-size: 56px;
    color: #a62b2b;
    margin: 0;
}

.text p {
    margin: 20px 0;
    line-height: 1.6;
}

.buttons {
    display: flex;
    gap: 15px;
}

.btn {
    padding: 12px 22px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.btn-primary {
    background: #a62b2b;
    color: white;
}

.btn-secondary {
    background: transparent;
    border: 1px solid #a62b2b;
    color: #a62b2b;
}

.image {
    flex: 1;
}

.image img {
    width: 100%;
    border-radius: 20px;
}

.cards {
    margin-top: 60px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

.card {
    flex: 1;
    background: white;
    padding: 25px;
    border-radius: 15px;
    min-width: 250px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
}

.card h3 {
    color: #a62b2b;
}

@media (max-width: 768px) {
    .hero {
        flex-direction: column;
    }

    .text h1 {
        font-size: 40px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="hero">
        <div class="text">
            <h1>EMARA</h1>
            <p>Architekturstudentin mit Fokus auf Entwurf, Konzept und nachhaltige Gestaltung.</p>

            <div class="buttons">
                <button class="btn btn-primary">Instagram</button>
                <button class="btn btn-secondary">Mehr</button>
            </div>
        </div>

        <div class="image">
            <img src="emma-stuhl.jpg">
        </div>
    </div>

    <div class="cards">
        <div class="card">
            <h3>Über mich</h3>
            <p>Ich entwerfe Räume, die Menschen berühren und funktional überzeugen.</p>
        </div>

        <div class="card">
            <h3>Fokus</h3>
            <p>Wohnbau · Nachhaltigkeit · Öffentliche Gebäude</p>
        </div>

        <div class="card">
            <h3>Standort</h3>
            <p>Augsburg / Rosenheim</p>
        </div>
    </div>

</div>

</body>
</html>
